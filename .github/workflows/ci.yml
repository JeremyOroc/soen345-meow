name: Full-Stack CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and Test with Gradle
        run: ./gradlew build

  frontend-build:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: npm install

      - name: Run Vitest Tests
        run: npm test -- --run

      - name: Build Frontend
        run: npm run build

  deploy-backend:
    name: Deploy Backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend-build, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway Deploy Hook
        env:
          RAILWAY_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RAILWAY_DEPLOY_HOOK_URL" ]; then
            echo "RAILWAY_DEPLOY_HOOK_URL is not set. Skipping backend deploy trigger."
            exit 0
          fi
          curl -fsSL -X POST "$RAILWAY_DEPLOY_HOOK_URL"

  deploy-frontend:
    name: Deploy Frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend-build, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Frontend Deploy Hook
        env:
          FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.FRONTEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$FRONTEND_DEPLOY_HOOK_URL" ]; then
            echo "FRONTEND_DEPLOY_HOOK_URL is not set. Skipping frontend deploy trigger."
            exit 0
          fi
          curl -fsSL -X POST "$FRONTEND_DEPLOY_HOOK_URL"
