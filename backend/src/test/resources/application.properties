server.max-http-request-header-size=64KB

spring.datasource.url=jdbc:h2:mem:meowtest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.sql.init.mode=never

# JWT Configuration
jwt.secret=test-secret-key-for-testing-only-change-in-production-at-least-64-characters-long-1234567890
jwt.expiration=3600000
