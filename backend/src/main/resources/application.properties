server.port=8080
server.max-http-request-header-size=64KB

# SQLite Database Configuration
# This ensures the DB is stored in the /data folder as you had it
spring.datasource.url=jdbc:sqlite:./data/meow.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Hibernate / JPA Settings
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL seeding
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:seed.sql
spring.jpa.defer-datasource-initialization=true

# JWT Configuration
jwt.secret=your-super-secret-key-that-should-be-changed-in-production-environment-at-least-32-characters
jwt.expiration=86400000

# Logging for easier troubleshooting before the deadline
logging.level.org.hibernate.SQL=DEBUG

# Mailtrap SMTP configuration
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=${MAILTRAP_USERNAME:replace-me}
spring.mail.password=${MAILTRAP_PASSWORD:replace-me}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
