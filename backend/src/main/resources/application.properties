server.port=8080
server.max-http-request-header-size=64KB

# SQLite Database Configuration
# This ensures the DB is stored in the /data folder as you had it
spring.datasource.url=jdbc:sqlite:./data/meow.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Hibernate / JPA Settings
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=your-super-secret-key-that-should-be-changed-in-production-environment-at-least-32-characters
jwt.expiration=86400000

# Logging for easier troubleshooting before the deadline
logging.level.org.hibernate.SQL=DEBUG
