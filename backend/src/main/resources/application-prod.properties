server.port=${PORT:8080}

# Production datasource configuration.
# Prefer DATABASE_URL from the cloud provider; fallback keeps local prod profile runnable.
spring.datasource.url=${DATABASE_URL:jdbc:sqlite:./data/meow.db}
spring.datasource.driver-class-name=${DB_DRIVER:org.sqlite.JDBC}

spring.jpa.database-platform=${HIBERNATE_DIALECT:org.hibernate.community.dialect.SQLiteDialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

jwt.secret=${JWT_SECRET:change-me-in-production-with-32-plus-characters}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAILTRAP_USERNAME:replace-me}
spring.mail.password=${MAILTRAP_PASSWORD:replace-me}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
